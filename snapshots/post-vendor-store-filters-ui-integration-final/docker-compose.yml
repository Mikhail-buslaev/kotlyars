services:
  app:
    image: kotlyars/opencart-app:local
    build:
      context: ./docker
      dockerfile: php/Dockerfile
    container_name: kotlyars_opencart_app
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./upload:/var/www/html
      - ./storage:/var/www/storage
      - ./docker/php/opencart.ini:/usr/local/etc/php/conf.d/opencart.ini
    depends_on:
      - db

  db:
    image: mariadb:10.6
    container_name: kotlyars_opencart_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: opencart
      MYSQL_USER: opencart
      MYSQL_PASSWORD: opencartpass
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci

  adminer:
    image: adminer
    container_name: kotlyars_adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    depends_on:
      - db

volumes:
  db_data: